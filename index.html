<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <!-- SDK Google GenAI -->
<script src="https://cdn.jsdelivr.net/npm/@google/genai@0.1.0/dist/index.js"></script>
<script src="https://unpkg.com/@google/genai@latest/dist/index.js"></script>
  <meta charset="UTF-8" />
  <meta name="google-site-verification" content="EsS5SAv2q2csUJYBg64RB8ndqFpdQhkdCcL1WX2QSPU" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Umuhinga AI - Assistant basé sur les savoirs traditionnels burundais + IA. Créé par Josué Raoul Drogba.">
  <meta property="og:title" content="Umuhinga AI | Sagesse du Burundi">
  <meta property="og:image" content="https://amani-ai.vercel.app/assets/avatar.jpeg">
  <meta property="og:url" content="https://ton-site.vercel.app">
  <link rel="canonical" href="https://ton-site.vercel.app" />
  
  <title>Umuhinga AI – Savoir traditionnel + IA</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@32,400,0,0" />
  <link rel="stylesheet" href="styles.css" />
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Chatbot",
    "name": "Umuhinga AI",
    "description": "Assistant santé et savoir traditionnel burundais",
    "url": "https://ton-site.vercel.app",
    "availableLanguage": ["fr","en","sw"],
    "creator": {
      "@type": "Person",
      "name": "Josué Raoul Drogba"
    }
  }
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const lang = navigator.language.slice(0,2);
      document.documentElement.lang = ['fr','en','sw'].includes(lang) ? lang : 'en';
      
      const translations = {
        fr: {
          title: "Umuhinga – Sagesse du Burundi",
          heading: "Umuhinga à vous !",
          subheading: "Plantes, remèdes & conseils traditionnels",
          placeholder: "Ex: diarrhée enfant, maux de ventre...",
          disclaimer: "Savoir traditionnel + IA. Vérifiez toujours auprès d'un médecin.",
          suggestions: [
            "Mon enfant a la diarrhée, que faire ?",
            "Plante pour le paludisme ?",
            "Comment soigner une blessure avec des feuilles ?"
          ]
        },
        en: {
          title: "Umuhinga – Burundian Wisdom",
          heading: "Umuhinga to you!",
          subheading: "Plants, remedies & traditional advice",
          placeholder: "E.g.: child diarrhea, stomach pain...",
          disclaimer: "Traditional knowledge + AI. Always check with a doctor.",
          suggestions: [
            "My child has diarrhea, what to do?",
            "Plant for malaria?",
            "How to heal a wound with leaves?"
          ]
        },
        sw: {
          title: "Umuhinga – Hekima ya Burundi",
          heading: "Umuhinga kwako!",
          subheading: "Mimea, tiba na ushauri wa kitamaduni",
          placeholder: "Mfano: mtoto ana harisha, tumbo...",
          disclaimer: "Ujuzi wa jadi + AI. Thibitisha na daktari kila wakati.",
          suggestions: [
            "Mtoto wangu ana harisha, nifanye nini?",
            "Mmea wa malaria?",
            "Jinsi ya kuponya jeraha kwa majani?"
          ]
        }
      };

      const t = translations[document.documentElement.lang] || translations.en;
      document.title = t.title;
      document.querySelector('.heading').textContent = t.heading;
      document.querySelector('.sub-heading').textContent = t.subheading;
      document.querySelector('.prompt-input').placeholder = t.placeholder;
      document.querySelector('.disclaimer-text').textContent = t.disclaimer;
      
      document.querySelectorAll('.suggestions-item .text').forEach((el, i) => {
        if (t.suggestions[i]) el.textContent = t.suggestions[i];
      });
    });
  </script>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <img src="assets/avatar.jpeg" alt="Umuhinga AI" class="app-logo" width="120" height="40" loading="lazy">
      <h1 class="heading">Umuhinga à vous !</h1>
      <h4 class="sub-heading">Plantes, remèdes & conseils traditionnels</h4>
    </header>

    <ul class="suggestions">
      <li class="suggestions-item">
        <p class="text">Mon enfant a la diarrhée, que faire ?</p>
        <span class="icon material-symbols-rounded">local_hospital</span>
      </li>
      <li class="suggestions-item">
        <p class="text">Plante pour le paludisme ?</p>
        <span class="icon material-symbols-rounded">grass</span>
      </li>
      <li class="suggestions-item">
        <p class="text">Comment soigner une blessure avec des feuilles ?</p>
        <span class="icon material-symbols-rounded">healing</span>
      </li>
    </ul>

    <div class="chats-container"></div>

    <div class="prompt-container">
      <div class="prompt-wrapper">
        <form action="#" class="prompt-form">
          <input type="text" class="prompt-input" required />
          <div class="prompt-actions">
            <div class="file-upload-wrapper">
              <img src="#" class="file-preview" />
              <input id="file-input" type="file" accept="image/*, .pdf, .txt, .csv" hidden />
              <button type="button" class="file-icon material-symbols-rounded">description</button>
              <button id="cancel-file-btn" type="button" class="material-symbols-rounded">close</button>
              <button id="add-file-btn" type="button" class="material-symbols-rounded">attach_file</button>
            </div>
            <button id="stop-response-btn" type="button" class="material-symbols-rounded">stop_circle</button>
            <button id="send-prompt-btn" class="material-symbols-rounded">arrow_upward</button>
          </div>
        </form>
        <button id="theme-toggle-btn" class="material-symbols-rounded">light_mode</button>
        <button id="delete-chats-btn" class="material-symbols-rounded">delete</button>
      </div>
      <p class="disclaimer-text">Savoir traditionnel + IA. Vérifiez toujours auprès d'un médecin.</p>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
